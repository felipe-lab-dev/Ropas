name: Deploy a produccion (East US 2)

# Sin DEV: cada push a main deploya directo a produccion en sub ROPAS.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # OIDC login a Azure

env:
  AZURE_SUB: 599b47be-0430-4dc8-997d-5526ebbfb1e6
  RG: rg-ropas
  ACR: acrropas
  ACR_LOGIN: acrropas.azurecr.io
  BACKEND_APP: ca-backend-ropas
  SWA_NAME: swa-ropas
  BACKEND_URL: https://ca-backend-ropas.politecliff-b5298e77.eastus2.azurecontainerapps.io

jobs:
  backend:
    name: Backend NestJS (build + deploy a Container App)
    runs-on: ubuntu-latest
    if: vars.AZURE_CLIENT_ID != ''
    environment:
      name: production
      url: https://ca-backend-ropas.politecliff-b5298e77.eastus2.azurecontainerapps.io
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Tag de imagen = sha corto
        id: meta
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build + push backend (az acr build)
        run: |
          az acr build \
            --subscription "$AZURE_SUB" \
            --registry "$ACR" \
            --image "backend:${{ steps.meta.outputs.tag }}" \
            --image "backend:latest" \
            --file backend/Dockerfile \
            backend/

      - name: Capturar revision previa (rollback)
        id: prev
        run: |
          prev=$(az containerapp revision list \
            --subscription "$AZURE_SUB" -g "$RG" -n "$BACKEND_APP" \
            --query "[?properties.active==\`true\`] | [0].name" -o tsv || true)
          echo "prev=$prev" >> "$GITHUB_OUTPUT"
          echo "Revision previa: $prev"

      - name: Update Container App
        run: |
          az containerapp update \
            --subscription "$AZURE_SUB" \
            --resource-group "$RG" \
            --name "$BACKEND_APP" \
            --image "$ACR_LOGIN/backend:${{ steps.meta.outputs.tag }}" \
            --output none

      - name: Esperar revision provisioned + healthy
        run: |
          for i in $(seq 1 30); do
            state=$(az containerapp revision list \
              --subscription "$AZURE_SUB" -g "$RG" -n "$BACKEND_APP" \
              --query "[?properties.active==\`true\`] | [0].properties.{state:provisioningState, health:healthState}" \
              -o json)
            echo "Revision: $state"
            if echo "$state" | grep -q '"state": "Provisioned"' && echo "$state" | grep -q '"health": "Healthy"'; then
              echo "Provisioned + Healthy"
              break
            fi
            sleep 10
          done

      - name: Smoke test - backend health
        run: |
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$BACKEND_URL/api/v1/health" || echo 000)
            echo "Health attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 8
          done
          echo "::error::Health check FAILED tras 10 intentos"
          az containerapp logs show \
            --subscription "$AZURE_SUB" -g "$RG" -n "$BACKEND_APP" --tail 100 || true
          exit 1

      - name: Rollback si fallo
        if: failure()
        run: |
          set +e
          prev="${{ steps.prev.outputs.prev }}"
          if [ -n "$prev" ]; then
            echo "::warning::Reactivando revision previa $prev"
            az containerapp revision activate \
              --subscription "$AZURE_SUB" -g "$RG" -n "$BACKEND_APP" --revision "$prev" || true
          fi
          az containerapp logs show \
            --subscription "$AZURE_SUB" -g "$RG" -n "$BACKEND_APP" --tail 200 || true

  frontend:
    name: Frontend Next.js (build static + deploy a SWA)
    runs-on: ubuntu-latest
    needs: backend
    if: success() && vars.AZURE_CLIENT_ID != ''
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps + build estatico
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ env.BACKEND_URL }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Deploy a Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'upload'
          app_location: 'frontend/out'
          skip_app_build: true
          skip_api_build: true
